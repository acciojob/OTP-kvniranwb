<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>OTP Verification</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <h1 id="verification_heading">Verify Your Account</h1>

  <p id="verification_subtext">
    We have sent a 6-digit OTP to your registered email.
  </p>

  <div class="code-container">
    <input id="code-1" class="code" maxlength="1" />
    <input id="code-2" class="code" maxlength="1" />
    <input id="code-3" class="code" maxlength="1" />
    <input id="code-4" class="code" maxlength="1" />
    <input id="code-5" class="code" maxlength="1" />
    <input id="code-6" class="code" maxlength="1" />
  </div>

  <script src="script.js"></script>
</body>
</html>
